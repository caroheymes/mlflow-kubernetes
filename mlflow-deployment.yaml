apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-test
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow-test
  template:
    metadata:
      labels:
        app: mlflow-test
    spec:
      serviceAccountName: mlflow-ksa
      containers:
      # ===== MLflow Container =====
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v3.12.0-full
        command: 
        - "sh"
        - "-c"
        - |
          mlflow server \
            --host 0.0.0.0 \
            --port 5000 \
            --backend-store-uri "postgresql://mlflow_user:${DB_PASSWORD}@127.0.0.1:5432/mlflow_db" \
            --default-artifact-root "${MLFLOW_DEFAULT_ARTIFACT_ROOT}" \
            --disable-security-middleware
        ports:
        - containerPort: 5000
          name: http
        envFrom:
        - configMapRef:
            name: mlflow-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mlflow-db-password
              key: password
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /
            port: 5000
            httpHeaders:
            - name: Host
              value: "localhost"
          initialDelaySeconds: 90
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 5000
            httpHeaders:
            - name: Host
              value: "localhost"
          initialDelaySeconds: 60
          periodSeconds: 5

      # ===== Cloud SQL Auth Proxy Sidecar =====
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.10.1
        args:
          - "--port=5432"
          - "--private-ip"
          - "ray-distributed-ml:europe-west1:mlflow-postgres" # <-- 
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-test-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: mlflow-test
  ports:
  - name: http
    protocol: TCP
    port: 5000
    targetPort: 5000
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mlflow-config
  namespace: default
data:
  MLFLOW_DEFAULT_ARTIFACT_ROOT: "gs://mlflow-artifacts-002/" # <--